 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: transparent;
    }

    /* CANVAS FUNDAL */
    #canvas {
        position: absolute;
        top: 0;
        left: 0;
    }

    /* LAYER EFECTE CADOURI */
    #fx {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
        top: 0;
        left: 0;
    }

    /* RACHETA */
    .rocket {
        position: absolute;
        width: 14px;
        height: 45px;
        background: #ff0066;
        border-radius: 6px;
        animation: rocketFly 0.55s ease-out forwards;
    }

    @keyframes rocketFly {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-900px); opacity: 0; }
    }

    /* CONFETTI */
    .confetti {
        position: absolute;
        width: 12px;
        height: 30px;
        background: var(--color);
        opacity: 1;
        transform: rotate(var(--rot));
        animation: confettiFall 1.4s cubic-bezier(.25,.46,.45,.94) forwards;
    }

    @keyframes confettiFall {
        0% { transform: translate(0,0) rotate(var(--rot)); opacity: 1; }
        70% { transform: translate(var(--tx), var(--ty)) rotate(calc(var(--rot) + 180deg)); opacity: 1; }
        100% { transform: translate(calc(var(--tx) * 0.7), calc(var(--ty) + 260px)) rotate(calc(var(--rot) + 260deg)); opacity: 0; }
    }

    /* CADOU ROTUND CURCUBEU */
    .gift-wrapper {
        position: absolute;
        width: 140px;
        height: 140px;
        padding: 10px;
        border-radius: 50%;
        background: conic-gradient(red, orange, yellow, green, cyan, blue, violet, red);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulseGlow 1.2s ease-out forwards, spinGift 2.5s linear infinite;
        box-shadow: 0 0 18px rgba(255,255,255,0.8);
    }

    @keyframes pulseGlow {
        0% { transform: scale(0.5); box-shadow: 0 0 4px rgba(255,255,255,0.4); }
        50% { transform: scale(1.2); box-shadow: 0 0 26px rgba(255,255,255,1); }
        100% { transform: scale(1); box-shadow: 0 0 14px rgba(255,255,255,0.7); }
    }

    @keyframes spinGift {
        0% { transform: rotate(0deg) scale(1); }
        100% { transform: rotate(360deg) scale(1); }
    }

    .gift-img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: transparent;
        object-fit: contain;
    }

    .gift-piece {
        position: absolute;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background-size: cover;
        background-position: center;
        animation: pieceFly 1.1s ease-out forwards;
    }

    @keyframes pieceFly {
        0% { transform: scale(0.3) translate(0,0); opacity: 1; }
        100% { transform: scale(1) translate(var(--tx), var(--ty)); opacity: 0; }
    }
    .uname {
    position: absolute;
    font-size: 64px;
    font-weight: 900;

    /* FUNDALUL NOU */
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(6px);
    padding: 6px 14px;
    border-radius: 14px;

    /* TEXTUL TĂU RAINBOW */
    color: transparent;
    background-image: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size: 400%;
    -webkit-background-clip: text;
    background-clip: text;

    animation: rainbow 3s linear infinite, unameFade 3s ease-out forwards;
    opacity: 0;
    text-shadow: 0 0 12px rgba(255,255,255,0.7);
}
     

    @keyframes rainbow {
        0% { background-position: 0%; }
        100% { background-position: 400%; }
    }

    @keyframes unameFade {
        0% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(1.25); }
    }
#top5-container {
    position: fixed;
    bottom: 20px;              /* îl pui jos */
    left: 50%;                 /* îl centrezi */
    transform: translateX(-50%);
    width: 90%;                /* cât de lat vrei */
    height: 150px;             /* înălțimea benzii */
    overflow: hidden;
    pointer-events: none;
    z-index: 999999;
} 

/* LISTA CARE SE DERULEAZĂ */
#top5-list {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 20px;
    animation: scrollHorizontal 25s linear infinite;
} 

@keyframes scrollHorizontal {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
} 

@keyframes scrollTop5 {
    0% { top: 0; }
    100% { top: -600px; } /* 5 poze × 120px + spații */
}

/* FIECARE POZĂ */
.top5-item {
    position: relative;
    width: 120px;
    height: 120px;
    margin: 10px auto;
}
/* CERC CURCUBEU ROTATIV */
.top5-ring {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    padding: 6px;
    background: conic-gradient(red, orange, yellow, green, cyan, blue, violet, red);
    display: flex;
    align-items: center;
    justify-content: center;
}
 

@keyframes spinRing {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* POZA DE PROFIL */
.top5-pic {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
}

/* ICONIȚE PREMIUM TOP 3 */
.top5-badge {
    position: absolute;
    width: 42px;
    height: 42px;
    bottom: -6px;
    right: -6px;
}
/* GLOW TOP 3 — versiune premium */
.glow-gold {
    box-shadow: 0 0 25px 10px rgba(255, 215, 0, 0.9);
}

.glow-silver {
    box-shadow: 0 0 25px 10px rgba(192, 192, 192, 0.9);
}

.glow-bronze {
    box-shadow: 0 0 25px 10px rgba(205, 127, 50, 0.9);
}
 

/* ANIMAȚIE POP TOP 3 */
.pop {
    animation: popAnim 0.45s ease-out;
}

@keyframes popAnim {
    0% { transform: scale(0.6); opacity: 0.4; }
    70% { transform: scale(1.25); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>
<canvas id="canvas"></canvas>
<div id="fx"></div>
<!-- TOP 5 PROFILE LIST -->
<div id="top5-container">
    <div id="top5-list"></div>
</div>
<script>
// -----------------------------
// SUNET EXPLOZIE CADOU
// -----------------------------
var explosionSound = new Audio("explosion.wav");
explosionSound.volume = 0.55;

// -----------------------------
// CONFIG CANVAS (EMOJI / PROFIL / STICKERE)
// -----------------------------
const EFFECTS = ["bounce", "gravity", "chaos", "explosion", "spiral", "float", "cannon"];

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

let objects = [];
const MAX_OBJECTS = 80; // redus pentru performanță

// cache pentru poze de profil
const profileCache = {};

// -----------------------------
// DESENARE POZĂ ÎN CERC CU CONTUR NEON (fără shadowBlur greu)
// -----------------------------
function drawCircleImage(ctx, img, x, y, size) {
    ctx.save();

    const neon = `hsl(${Math.floor(Math.random()*360)}, 100%, 60%)`;

    ctx.beginPath();
    ctx.arc(x, y, size / 2 + 5, 0, Math.PI * 2);
    ctx.strokeStyle = neon;
    ctx.lineWidth = 6;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(x, y, size / 2, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(img, x - size / 2, y - size / 2, size, size);

    ctx.restore();
}

// -----------------------------
// RANDOM EFFECT SELECTOR
// -----------------------------
function randomEffect() {
    return EFFECTS[Math.floor(Math.random() * EFFECTS.length)];
}

// -----------------------------
// SPAWN EMOJI
// -----------------------------
function spawnEmoji(emoji) {
    if (objects.length > MAX_OBJECTS) return;

    objects.push({
        type: "emoji",
        emoji: emoji,
        effect: randomEffect(),
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() * 18 - 9),
        vy: (Math.random() * 18 - 9),
        size: 110,
        born: Date.now(),
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.2
    });
}

// -----------------------------
// SPAWN STICKER
// -----------------------------
function spawnSticker(url) {
    if (objects.length > MAX_OBJECTS) return;

    const img = new Image();
    img.src = url;

    objects.push({
        type: "sticker",
        img: img,
        effect: randomEffect(),
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() * 18 - 9),
        vy: (Math.random() * 18 - 9),
        size: 120,
        born: Date.now(),
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.1
    });
}

// -----------------------------
// LOAD PROFILE CU CACHE
// -----------------------------
function loadProfile(url, callback) {
    if (!url) return;
    if (profileCache[url]) {
        callback(profileCache[url]);
        return;
    }
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
        profileCache[url] = img;
        callback(img);
    };
    img.src = url;
}

// -----------------------------
// SPAWN PROFILE + EMOJI
// -----------------------------
function spawnProfileEmoji(emoji, profileUrl) {
    if (objects.length > MAX_OBJECTS) return;
    if (!profileUrl) {
        spawnEmoji(emoji);
        return;
    }

    loadProfile(profileUrl, (img) => {
        if (objects.length > MAX_OBJECTS) return;

        objects.push({
            type: "profile",
            img: img,
            effect: randomEffect(),
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() * 18 - 9),
            vy: (Math.random() * 18 - 9),
            size: 120,
            born: Date.now(),
            rot: Math.random() * Math.PI * 2,
            vr: (Math.random() - 0.5) * 0.1
        });

        objects.push({
            type: "emoji",
            emoji: emoji,
            effect: randomEffect(),
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() * 18 - 9),
            vy: (Math.random() * 18 - 9),
            size: 110,
            born: Date.now(),
            rot: Math.random() * Math.PI * 2,
            vr: (Math.random() - 0.5) * 0.2
        });
    });
}

// -----------------------------
// EFECTE CANVAS
// -----------------------------
function applyEffect(o) {
    switch (o.effect) {
        case "bounce":
            if (o.x < 0 || o.x > canvas.width) o.vx *= -1;
            if (o.y < 0 || o.y > canvas.height) o.vy *= -1;
            break;

        case "gravity":
            o.vy += 0.2;
            if (o.y > canvas.height - 20) {
                o.y = canvas.height - 20;
                o.vy *= -0.7;
            }
            break;

        case "chaos":
            o.vx += (Math.random() - 0.5) * 1.5;
            o.vy += (Math.random() - 0.5) * 1.5;
            break;

        case "explosion":
            o.vx *= 1.01;
            o.vy *= 1.01;
            break;

        case "spiral":
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const dx = o.x - cx;
            const dy = o.y - cy;
            o.vx = -dy / 20;
            o.vy = dx / 20;
            break;

        case "float":
            o.vy -= 0.2;
            o.vx += (Math.random() - 0.5) * 0.2;
            break;

        case "cannon":
            o.vx *= 1.02;
            o.vy *= 1.02;
            break;
    }
}

// -----------------------------
// LOOP CANVAS cu limitare la ~30 FPS
// -----------------------------
let last = 0;
function loop(ts) {
    if (ts - last < 33) {
        requestAnimationFrame(loop);
        return;
    }
    last = ts;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const now = Date.now();

    for (let i = objects.length - 1; i >= 0; i--) {
        const o = objects[i];

        o.x += o.vx;
        o.y += o.vy;
        o.rot += o.vr;

        applyEffect(o);

        if (o.type === "profile" && o.img.complete) {
            ctx.save();
            ctx.translate(o.x, o.y);
            ctx.rotate(o.rot);
            drawCircleImage(ctx, o.img, 0, 0, o.size);
            ctx.restore();
        }

        if (o.type === "sticker" && o.img.complete) {
            ctx.save();
            ctx.translate(o.x, o.y);
            ctx.rotate(o.rot);
            ctx.drawImage(o.img, -o.size/2, -o.size/2, o.size, o.size);
            ctx.restore();
        }

        if (o.type === "emoji") {
            ctx.save();
            ctx.translate(o.x, o.y);
            ctx.rotate(o.rot);

            let emo = o.emoji;
            if (emo === "❤") emo = "❤️";

            ctx.font = o.size + "px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(emo, 0, 0);
            ctx.restore();
        }

        if (now - o.born > 7000) {
            objects.splice(i, 1);
        }
    }

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// -----------------------------
// EXTRAGERE POZĂ PROFIL
// -----------------------------
function getProfileUrl(data) {
    if (data.profilePictureUrl) return data.profilePictureUrl;
    if (data.userDetails?.profilePictureUrls?.[0]) return data.userDetails.profilePictureUrls[0];
    return null;
}

// -----------------------------
// EFECTE CADOURI (HTML + CSS)
// -----------------------------
var giftFX = {
    "Popular Vote": ["#ff0066", "#00ccff", "#ffff00", "#ff6600"],
    "Rose": ["#ff0033", "#ff6699", "#ff3366"],
    "Lion": ["#ffaa00", "#ffdd55", "#ff8800"],
    "Universe": ["#0033ff", "#6600ff", "#00ccff"],
    "Crown": ["#ffd700", "#fff5a0", "#ffcc00"],
    "Dragon": ["#ff3300", "#ff6600", "#cc0000"]
};

function triggerFX(giftName, giftImg, username) {
    var colors = giftFX[giftName] || ["#ff0066", "#00ccff", "#ffff00"];
    rocketBurst(username, giftImg, colors);
}

function rocketBurst(username, giftImg, colors) {
    var fx = document.getElementById("fx");

    var rocket = document.createElement("div");
    rocket.className = "rocket";

    var x = Math.random() * window.innerWidth;
    rocket.style.left = x + "px";
    rocket.style.bottom = "0px";

    fx.appendChild(rocket);

    setTimeout(function () {
        explode(x, window.innerHeight * 0.50, username, giftImg, colors);
        rocket.remove();
    }, 500);
}

function explode(x, y, username, giftImg, colors) {
    var fx = document.getElementById("fx");

    explosionSound.currentTime = 0;
    explosionSound.play();

    if (giftImg) {
        var wrap = document.createElement("div");
        wrap.className = "gift-wrapper";
        wrap.style.left = (x - 70) + "px";
        wrap.style.top = (y - 70) + "px";

        var img = document.createElement("img");
        img.src = giftImg;
        img.className = "gift-img";

        wrap.appendChild(img);
        fx.appendChild(wrap);

        setTimeout(function () {
            for (var i = 0; i < 20; i++) { // 40 -> 20
                var piece = document.createElement("div");
                piece.className = "gift-piece";

                piece.style.left = x + "px";
                piece.style.top = y + "px";
                piece.style.backgroundImage = "url('" + giftImg + "')";

                var angle = Math.random() * 2 * Math.PI;
                var distance = 150 + Math.random() * 220;

                piece.style.setProperty("--tx", Math.cos(angle) * distance + "px");
                piece.style.setProperty("--ty", Math.sin(angle) * distance + "px");

                fx.appendChild(piece);

                (function(p){
                    setTimeout(function(){ p.remove(); }, 1100);
                })(piece);
            }
        }, 250);

        setTimeout(function () { wrap.remove(); }, 1500);
    }

    var name = document.createElement("div");
    name.className = "uname";
    name.innerText = username;
    name.style.left = (x - 200) + "px";
    name.style.top = (y + 120) + "px";
    fx.appendChild(name);
    setTimeout(function () { name.remove(); }, 3000);

    for (var i = 0; i < 40; i++) { // 80 -> 40
        var c = document.createElement("div");
        c.className = "confetti";

        var angle = Math.random() * 2 * Math.PI;
        var distance = 250 + Math.random() * 250;

        c.style.left = x + "px";
        c.style.top = y + "px";

        c.style.setProperty("--tx", Math.cos(angle) * distance + "px");
        c.style.setProperty("--ty", Math.sin(angle) * distance + "px");
        c.style.setProperty("--color", colors[Math.floor(Math.random() * colors.length)]);
        c.style.setProperty("--rot", (Math.random() * 360) + "deg");

        fx.appendChild(c);

        (function(cc){
            setTimeout(function(){ cc.remove(); }, 1400);
        })(c);
    }
}

// -----------------------------
// WEBSOCKET UNIC PENTRU TOT
// -----------------------------
const ws = new WebSocket("ws://localhost:62024");

const emojiRegex = /([\u203C-\u3299]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|\uD83E[\uDD00-\uDFFF])/g;

ws.onmessage = (event) => {
    let packet;
    try { packet = JSON.parse(event.data); } catch(e) { return; }

    if (packet.event === "chat") {
        const data = packet.data;

        const msg = data.comment || "";
        const user = data.nickname || "";
        const profileUrl = getProfileUrl(data);

        let msgEmojis = msg.match(emojiRegex) || [];
        let nameEmojis = user.match(emojiRegex) || [];

        const allEmojis = [...msgEmojis, ...nameEmojis];

        if (allEmojis.length === 0) return;

        allEmojis.forEach(e => {
            if (profileUrl) spawnProfileEmoji(e, profileUrl);
            else spawnEmoji(e);
        });

        if (data.emotes) {
            data.emotes.forEach(e => {
                if (e.emoteImageUrl) spawnSticker(e.emoteImageUrl);
            });
        }
    }

    if (packet.event === "gift") {
        const g = packet.data || {};
        const profileUrl = getProfileUrl(g);

        let emo = "🎉";
        if (g.diamondCount > 1 && g.diamondCount <= 20) emo = "💥";
        else if (g.diamondCount > 20) emo = "🤯";

        if (profileUrl) spawnProfileEmoji(emo, profileUrl);
        else spawnEmoji(emo);

        const giftName = g.giftName || "";
        const giftImg = g.giftPictureUrl || "";
        const username = g.nickname || g.uniqueId || "Anonim";

        triggerFX(giftName, giftImg, username);
    }
};
/* -----------------------------
   TOP 5 PROFILE SYSTEM
----------------------------- */

let topProfiles = [];
let lastTop3 = [];

// Adaugă o poză în top
function updateTopProfiles(profileUrl) {
    if (!profileUrl) return;

    // dacă există deja, o mutăm în față
    topProfiles = topProfiles.filter(p => p !== profileUrl);
    topProfiles.unshift(profileUrl);

    // păstrăm doar top 5
    topProfiles = topProfiles.slice(0, 10); 

    renderTop5();
}

// RENDER TOP 5
function renderTop5() {
    const list = document.getElementById("top5-list");
    list.innerHTML = "";

    topProfiles.forEach((url, index) => {
        const pos = index + 1;

        const item = document.createElement("div");
        item.className = "top5-item";

        const ring = document.createElement("div");
        ring.className = "top5-ring";

        const img = document.createElement("img");
        img.src = url;
        img.className = "top5-pic";

        ring.appendChild(img);
        item.appendChild(ring);

        // TOP 3 — glow + pop
        if (pos === 1) ring.classList.add("glow-gold");
        if (pos === 2) ring.classList.add("glow-silver");
        if (pos === 3) ring.classList.add("glow-bronze");

        if (pos <= 3 && lastTop3[pos - 1] !== url) {
            ring.classList.add("pop");
            setTimeout(() => ring.classList.remove("pop"), 500);
        }

        list.appendChild(item);
    });

    lastTop3 = topProfiles.slice(0, 3);
}
// duplicăm lista pentru scroll infinit
topProfiles.forEach((url, index) => {
    const pos = index + 1;

    const item = document.createElement("div");
    item.className = "top5-item";

    const ring = document.createElement("div");
    ring.className = "top5-ring";

    const img = document.createElement("img");
    img.src = url;
    img.className = "top5-pic";

    ring.appendChild(img);
    item.appendChild(ring);

    if (pos === 1) ring.classList.add("glow-gold");
    if (pos === 2) ring.classList.add("glow-silver");
    if (pos === 3) ring.classList.add("glow-bronze");

    list.appendChild(item);
});
// RANDOM ROTATION pentru toate .top5-ring
document.querySelectorAll('.top5-ring').forEach(ring => {
    const direction = Math.random() < 0.5 ? 1 : -1;
    const speed = 3 + Math.random() * 7;   // între 3 și 10 secunde
    const delay = Math.random() * 2;       // între 0 și 2 secunde

    ring.style.animation = `spinRing ${speed}s linear infinite`;
    ring.style.animationDelay = `${delay}s`;

    if (direction === -1) {
        ring.style.animationDirection = "reverse";
    }
});
/* -----------------------------
   INTEGRARE CORECTĂ CU WEBSOCKET
----------------------------- */

const originalWSHandler = ws.onmessage;

ws.onmessage = (event) => {

    // 1) RULĂM EFECTELE TALE ORIGINALE
    if (typeof originalWSHandler === "function") {
        originalWSHandler(event);
    }

    // 2) RULĂM TOP 5
    let packet;
    try { packet = JSON.parse(event.data); } catch(e) { return; }

    // CHAT
    if (packet.event === "chat") {
        const data = packet.data;
        const profileUrl = getProfileUrl(data);
        if (profileUrl) updateTopProfiles(profileUrl);
    }

    // GIFT
    if (packet.event === "gift") {
        const g = packet.data || {};
        const profileUrl = getProfileUrl(g);
        if (profileUrl) updateTopProfiles(profileUrl);
    }

    // LIKE (tap-tap)
    if (packet.event === "like") {
        const l = packet.data || {};
        const profileUrl = getProfileUrl(l);
        if (profileUrl) updateTopProfiles(profileUrl);
    }
}; 
 
</script>
</body>
</html>
